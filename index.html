<!DOCTYPE html>
<html>
<head>
  <title>Smart Godown Control</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background-color: #111;
      color: white;
    }

    button {
      width: 120px;
      height: 40px;
      margin: 8px;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .on { background-color: #28a745; }
    .off { background-color: #dc3545; }
    .all { background-color: #007bff; }
    .motion { background-color: #ff9800; }
  </style>
</head>

<body>

<h2>Smart Godown Control</h2>

<!-- Section Controls -->
<div>
  <h3>Section 1</h3>
  <button class="on" onclick="send('R1ON')">ON</button>
  <button class="off" onclick="send('R1OFF')">OFF</button>

  <h3>Section 2</h3>
  <button class="on" onclick="send('R2ON')">ON</button>
  <button class="off" onclick="send('R2OFF')">OFF</button>

  <h3>Section 3</h3>
  <button class="on" onclick="send('R3ON')">ON</button>
  <button class="off" onclick="send('R3OFF')">OFF</button>

  <h3>Section 4</h3>
  <button class="on" onclick="send('R4ON')">ON</button>
  <button class="off" onclick="send('R4OFF')">OFF</button>
</div>

<hr>

<!-- Global Controls -->
<div>
  <h3>Global Control</h3>
  <button class="all" onclick="send('ALLON')">ALL ON</button>
  <button class="all" onclick="send('ALLOFF')">ALL OFF</button>
</div>

<hr>

<!-- Motion Control -->
<div>
  <h3>Motion Mode</h3>
  <button class="motion" onclick="send('MOTIONON')">Motion ON</button>
  <button class="motion" onclick="send('MOTIONOFF')">Motion OFF</button>
</div>

<script>
  // ⚠️ IMPORTANT: Put your ESP IP here
  const espIP = "http://192.168.0.125";  // CHANGE THIS

  function send(command) {
    fetch(`${espIP}/api/${command}`)
      .then(response => console.log("Sent:", command))
      .catch(error => console.log("Error:", error));
  }
</script>

</body>
</html>
