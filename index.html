<!DOCTYPE html>
<html>

<head>

<title>SMART GODOWN</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>SMART GODOWN</h1>

<div class="card">

<h3>Status</h3>

<p>Motion: <span id="motion">...</span></p>
<p>Clap: <span id="clap">...</span></p>

<button onclick="toggleMotion()">Toggle Motion</button>
<button onclick="toggleClap()">Toggle Clap</button>

</div>


<div class="card">

<h3>Sections</h3>

<div class="sections">

<div id="s1" class="dot"></div>
<div id="s2" class="dot"></div>
<div id="s3" class="dot"></div>
<div id="s4" class="dot"></div>

</div>

<br>

<button onclick="relay(1)">Relay 1</button>
<button onclick="relay(2)">Relay 2</button>
<button onclick="relay(3)">Relay 3</button>
<button onclick="relay(4)">Relay 4</button>

<br><br>

<button class="danger" onclick="allOff()">ALL OFF</button>

</div>


<div class="card">

<h3>Energy Saved</h3>
<h2 id="energy">0</h2>

</div>


<script src="script.js"></script>

</body>
</html>
